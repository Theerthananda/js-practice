<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Counting</title>
</head>
<body>
    <center>
       <font color="blue">
    <h1>People Counting</h1>
    <p id="peopleCount">0</p>
    

    <button onclick="incrementCount()" style="background-color: green; color: white;">Enter</button>
    <button onclick="decrementCount()" style="background-color: red; color: white;">Exit</button>
    <button onclick="save()" style="background-color: blue; color: white;">Save Count</button>

    <p id="save-ele">Previous Count:  </p>
    </center>

    <script src="SimplePeopleCountingApp.js"></script>
</body>
</html>


<!--
!DOCTYPE is the document type declaration for an HTML5 document
and  <meta name="viewport" content="width=device-width, initial-scale=1.0"> is a meta tag that sets the viewport width and initial scale -->
