<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="blackjack.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackJack</title>
</head> 
<body>
    <div class="game-box">
        <h1>BlackJack</h1>
        <p id="message-el">Do you want to draw a new card?</p>
        <p id="cards-el">Cards :</p>
        <p id="sum-el">Sum :</p>

        <button class="btn" onclick="startGame()">START GAME</button>
        <button class="btn" onclick="newCard()">NEW CARD</button>
        <button class="btn" onclick="resetGame()">RESET GAME</button>
        <button class="btn" onclick="quitGame()">QUIT GAME</button>
        <button class="btn" onclick="location.reload()" style="display: none;">PLAY AGAIN</button>

        <p id="score-el">Game Score: 0</p>
    </div>

    <script src="BlackJack.js"></script>
</body>
</html>
